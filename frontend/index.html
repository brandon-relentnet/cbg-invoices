<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1b25" />
    <title>Cambridge Invoice Portal</title>

    <!--
      Pre-connect to the Google Fonts CDN so the browser can negotiate TLS
      while the HTML is still parsing. display=swap ensures fallback fonts
      render immediately if Google Fonts is slow.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!--
      Critical inline CSS. Applies the brand background, font stack, and
      pre-mount splash screen BEFORE the bundled CSS arrives, eliminating
      the white flash of unstyled content on cold loads.
    -->
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #ede5d8; /* --color-stone */
        color: #1b2830; /* --color-graphite */
        font-family: "Plus Jakarta Sans", system-ui, -apple-system,
          "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ede5d8;
      }

      /* Splash screen that's visible until React hydrates */
      .app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background-color: #ede5d8;
        color: #0b1b25; /* navy */
        font-family: "DM Serif Display", Georgia, serif;
        transition: opacity 0.2s ease-out;
      }
      .app-splash__brand {
        font-size: 2rem;
        letter-spacing: 0.01em;
      }
      .app-splash__kicker {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-size: 0.6875rem;
        font-weight: 700;
        color: #c8923c; /* amber */
      }
      .app-splash__spinner {
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid #0b1b25;
        border-right-color: transparent;
        border-radius: 9999px;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__spinner {
          animation: none;
        }
      }
      /* React removes .app-splash once mounted */
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-splash" aria-hidden="true">
        <span class="app-splash__kicker">Cambridge</span>
        <span class="app-splash__brand">Invoice Portal</span>
        <span class="app-splash__spinner"></span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
