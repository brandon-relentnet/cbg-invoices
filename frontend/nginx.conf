server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ──────────────────────────────────────────────────────────────────────
  # MIME types
  #
  # nginx:alpine's bundled mime.types does NOT map .mjs to a JS MIME type
  # in older versions, and our X-Content-Type-Options: nosniff (good!)
  # below means the browser refuses to execute a module served as
  # application/octet-stream. That's why the PDF.js worker fails to load
  # — it's shipped as a .mjs ES module.
  #
  # The regex location below explicitly serves .mjs as JavaScript.
  # ──────────────────────────────────────────────────────────────────────
  location ~ \.mjs$ {
    types { application/javascript mjs; }
    add_header Cache-Control "public, immutable" always;
    expires 1y;
  }

  # WebAssembly worker support, just in case react-pdf's worker uses it
  location ~ \.wasm$ {
    types { application/wasm wasm; }
    add_header Cache-Control "public, immutable" always;
    expires 1y;
  }

  # Static assets — long cache, immutable hashes from Vite
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — all routes go to index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Security headers (apply to every response)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
