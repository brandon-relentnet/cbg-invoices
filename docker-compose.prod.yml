# Coolify-oriented overrides.
#
# Apply with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Coolify will:
# - Inject env vars at runtime (APP_BASE_URL, LOGTO_ENDPOINT, etc.)
# - Route HTTPS via its reverse proxy (no port mappings needed)
# - Pull from Git on each deploy
services:
  postgres:
    ports: []

  logto:
    ports: []

  backend:
    build:
      target: prod
    volumes: []
    ports: []
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      target: prod
      # VITE_* values must be available at BUILD time — Vite bakes them
      # into the static JS bundle. Coolify reads these from your env vars
      # and passes them through here.
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_LOGTO_ENDPOINT: ${VITE_LOGTO_ENDPOINT}
        VITE_LOGTO_APP_ID: ${VITE_LOGTO_APP_ID}
        VITE_LOGTO_RESOURCE: ${VITE_LOGTO_RESOURCE}
    volumes: []
    ports: []
    command: ["nginx", "-g", "daemon off;"]
